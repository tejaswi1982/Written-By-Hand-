        <p>One quiet question. Ten quiet minutes. One page by hand.</p>

        <div class="eyebrow">For the page</div>
        <p class="q" data-prompt>What do you want to begin again?</p>

      <p class="micro center" style="margin-top: 28px;">Write by hand. Photograph the page when you're done.</p>
